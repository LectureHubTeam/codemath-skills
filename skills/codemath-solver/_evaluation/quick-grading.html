<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Grading - Codemath Solver</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #1a1a2e; color: #eee; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { color: #00d9ff; margin-bottom: 10px; }
        .subtitle { color: #888; margin-bottom: 30px; }
        .eval-card { background: #16213e; border-radius: 12px; padding: 24px; margin-bottom: 20px; border: 2px solid #0f3460; }
        .eval-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .eval-title { font-size: 18px; font-weight: 600; color: #00d9ff; }
        .prompt { background: #0f3460; padding: 12px; border-radius: 6px; font-family: monospace; font-size: 13px; margin-bottom: 20px; }
        .assertions { margin-bottom: 20px; }
        .assertion { display: flex; align-items: center; padding: 10px; background: #1a1a2e; border-radius: 6px; margin-bottom: 8px; }
        .assertion input[type="checkbox"] { width: 20px; height: 20px; margin-right: 12px; cursor: pointer; }
        .assertion label { flex: 1; cursor: pointer; font-size: 14px; }
        .timing { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 15px 0; }
        .timing input { background: #0f3460; border: 1px solid #333; color: #eee; padding: 10px; border-radius: 6px; }
        .feedback { width: 100%; padding: 10px; background: #0f3460; border: 1px solid #333; color: #eee; border-radius: 6px; min-height: 60px; margin: 15px 0; }
        .save-btn { background: #00d9ff; color: #000; border: none; padding: 12px 24px; border-radius: 6px; font-weight: 600; cursor: pointer; width: 100%; }
        .save-btn:hover { background: #00b8d4; }
        .status-badge { padding: 6px 12px; border-radius: 4px; font-size: 12px; font-weight: 600; }
        .status-pending { background: #ffd700; color: #000; }
        .status-passed { background: #00ff88; color: #000; }
        .status-failed { background: #ff4757; color: #fff; }
        .progress { height: 8px; background: #0f3460; border-radius: 4px; overflow: hidden; margin-bottom: 30px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #00d9ff, #00ff88); transition: width 0.3s; }
        .summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 30px; }
        .stat { background: #16213e; padding: 20px; border-radius: 8px; text-align: center; }
        .stat-value { font-size: 32px; font-weight: 700; color: #00d9ff; }
        .stat-label { font-size: 12px; color: #888; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Codemath-Solver Quick Grading</h1>
        <p class="subtitle">Input kết quả evals nhanh chóng</p>
        
        <div class="progress"><div class="progress-fill" id="progress" style="width: 0%"></div></div>
        
        <div class="summary">
            <div class="stat">
                <div class="stat-value" id="total">5</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="passed-count">0</div>
                <div class="stat-label">Passed</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="failed-count">0</div>
                <div class="stat-label">Failed</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="pass-rate">-%</div>
                <div class="stat-label">Pass Rate</div>
            </div>
        </div>
        
        <div id="evals-container"></div>
    </div>
    
    <script>
        const evals = [
            { id: 1, name: 'solve-specific-problem', prompt: 'Giải bài hsgthaibinh2425sodacbiet trên codemath bằng Python', assertions: 6 },
            { id: 2, name: 'find-unsolved-problems', prompt: 'Tìm 10 bài chưa giải trong HSG Thái Bình', assertions: 5 },
            { id: 3, name: 'retrieve-ac-code', prompt: 'Lấy lại code bài hsghanoi2024catinh đã AC', assertions: 5 },
            { id: 4, name: 'solve-contest', prompt: 'Giải toàn bộ contest', assertions: 5 },
            { id: 5, name: 'find-easiest-unsolved', prompt: 'Bài nào dễ nhất chưa giải', assertions: 5 }
        ];
        
        const assertionLabels = {
            1: ['Skill triggered', 'Parameters extracted', 'Flow followed', 'Code generated', 'Local tested', 'Approval asked'],
            2: ['Skill triggered', 'Filters applied', 'Parsed correctly', 'Unsolved filtered', 'Results displayed'],
            3: ['Skill triggered', 'Navigated to problem', 'Opened submissions', 'Filtered AC', 'Copied source'],
            4: ['Skill triggered', 'Contest parsed', 'Loop executed', 'Flow A called', 'Progress reported'],
            5: ['Skill triggered', 'Filters applied', 'Parsed correctly', 'Unsolved filtered', 'Results displayed']
        };
        
        function renderEvals() {
            const container = document.getElementById('evals-container');
            let html = '';
            
            evals.forEach((evalItem, idx) => {
                const assertionHtml = assertionLabels[evalItem.id].map((label, i) => `
                    <div class="assertion">
                        <input type="checkbox" id="assert-${evalItem.id}-${i}" onchange="updateStatus(${evalItem.id})">
                        <label for="assert-${evalItem.id}-${i}">${label}</label>
                    </div>
                `).join('');
                
                html += `
                    <div class="eval-card" id="eval-card-${evalItem.id}">
                        <div class="eval-header">
                            <div class="eval-title">Eval #${evalItem.id}: ${evalItem.name}</div>
                            <div class="status-badge status-pending" id="status-${evalItem.id}">⏳ Pending</div>
                        </div>
                        <div class="prompt">📝 ${evalItem.prompt}</div>
                        <div class="assertions">${assertionHtml}</div>
                        <div class="timing">
                            <input type="number" id="duration-${evalItem.id}" placeholder="⏱ Duration (seconds)">
                            <input type="number" id="tokens-${evalItem.id}" placeholder="💾 Tokens">
                        </div>
                        <textarea class="feedback" id="feedback-${evalItem.id}" placeholder="📝 Feedback (optional)"></textarea>
                        <button class="save-btn" onclick="saveEval(${evalItem.id})">💾 Save Eval #${evalItem.id}</button>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        function updateStatus(evalId) {
            const checkboxes = document.querySelectorAll(`[id^="assert-${evalId}-"]`);
            const checked = Array.from(checkboxes).filter(cb => cb.checked).length;
            const total = checkboxes.length;
            const percent = (checked / total) * 100;
            
            const statusEl = document.getElementById(`status-${evalId}`);
            if (percent >= 100) {
                statusEl.className = 'status-badge status-passed';
                statusEl.textContent = '✅ Passed';
            } else if (percent >= 50) {
                statusEl.className = 'status-badge status-pending';
                statusEl.textContent = `⚠️ Partial (${Math.round(percent)}%)`;
            } else {
                statusEl.className = 'status-badge status-failed';
                statusEl.textContent = `❌ Failed (${Math.round(percent)}%)`;
            }
            
            updateSummary();
        }
        
        function updateSummary() {
            const passed = evals.filter((_, idx) => {
                const checkboxes = document.querySelectorAll(`[id^="assert-${idx + 1}-"]`);
                const checked = Array.from(checkboxes).filter(cb => cb.checked).length;
                return checked === checkboxes.length && checked > 0;
            }).length;
            
            const failed = evals.filter((_, idx) => {
                const checkboxes = document.querySelectorAll(`[id^="assert-${idx + 1}-"]`);
                const checked = Array.from(checkboxes).filter(cb => cb.checked).length;
                return checked === 0;
            }).length;
            
            const total = evals.length;
            const rate = ((passed / total) * 100).toFixed(0);
            
            document.getElementById('passed-count').textContent = passed;
            document.getElementById('failed-count').textContent = failed;
            document.getElementById('pass-rate').textContent = `${rate}%`;
            document.getElementById('progress').style.width = `${rate}%`;
        }
        
        function saveEval(evalId) {
            const checkboxes = document.querySelectorAll(`[id^="assert-${evalId}-"]`);
            const assertions = Array.from(checkboxes).map((cb, idx) => ({
                name: assertionLabels[evalId][idx],
                text: cb.nextElementSibling.textContent,
                passed: cb.checked,
                evidence: cb.checked ? 'Verified during run' : 'Failed during run'
            }));
            
            const duration = document.getElementById(`duration-${evalId}`).value;
            const tokens = document.getElementById(`tokens-${evalId}`).value;
            const feedback = document.getElementById(`feedback-${evalId}`).value;
            
            const passed = assertions.filter(a => a.passed).length;
            const total = assertions.length;
            const status = passed === total ? 'passed' : passed >= total * 0.5 ? 'partial' : 'failed';
            
            const grading = {
                eval_id: evalId,
                eval_name: evals.find(e => e.id === evalId).name,
                graded_at: new Date().toISOString(),
                status: status,
                assertions: assertions,
                timing: {
                    duration_seconds: duration ? parseFloat(duration) : null,
                    token_usage: tokens ? parseInt(tokens) : null
                },
                feedback: feedback,
                passed: passed === total
            };
            
            const btn = document.querySelector(`button[onclick="saveEval(${evalId})"]`);
            const originalText = btn.textContent;
            btn.textContent = '✅ Saved!';
            btn.style.background = '#00ff88';
            
            setTimeout(() => {
                btn.textContent = originalText;
                btn.style.background = '#00d9ff';
            }, 2000);
            
            console.log(`Saved eval #${evalId}:`, grading);
            alert(`✅ Saved eval #${evalId}\nPass rate: ${Math.round((passed/total)*100)}% (${passed}/${total})`);
            
            // Download JSON
            const blob = new Blob([JSON.stringify(grading, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `grading-eval-${evalId}.json`;
            a.click();
        }
        
        renderEvals();
    </script>
</body>
</html>
